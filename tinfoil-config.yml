cvm-version: 0.7.1
cpus: 128
gpus: 8
memory: 1966080

containers:
  - name: ml-training
    image: "us-central1-docker.pkg.dev/workshop-labs-pbc/pollux-docker/ml-training@sha256:1587af04ac357ddcf0e802433a0ec6269cea62ad4ff08e076b6bb644d34b89e9"
    entrypoint:
      - python
    command:
      - -m
      - scripts.training_server
    runtime: nvidia
    gpus: all
    ipc: host
    env:
      - GOOGLE_APPLICATION_CREDENTIALS: /key.json
      - POLLUX_LN_GCS_BUCKET: gs://pollux-enc-prod
      - KEY_MODE: real_keys
    volumes:
      - /mnt/ramdisk/gcloud_key.json:/key.json:ro
      - /mnt/ramdisk/data:/data
    secrets:
      - GCLOUD_KEY
      - HF_TOKEN
      - TINFOIL_API_KEY
      - INTERNAL_SERVICE_SECRET

shim:
  upstream-port: 8000
  paths:
    - /dev/ping
    - /prod/ping
    - /status
    - /train
    - /dev/train
    - /prod/train
    - /upload/start
    - /dev/upload/start
    - /prod/upload/start
    - /upload/batch
    - /dev/upload/batch
    - /prod/upload/batch
    - /upload/finalize
    - /dev/upload/finalize
    - /prod/upload/finalize
    - /cancel_task
    - /retry
    - /queue_status
    - /list_task_ids
    - /lock_state
    - /clear_queue
    - /list_models
    - /dev/list_models
    - /prod/list_models
    - /v1/user/*
