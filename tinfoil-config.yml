shim-version: v0.4.2@sha256:d65f769e37bbe86ffaeef42120c29c4b9de33415fcd7588a9ef7a64f609aa2a3
cvm-version: 0.6.10
cpus: 128
memory: 1966080

containers:
  - name: ml-training
    image: "us-central1-docker.pkg.dev/workshop-labs-pbc/pollux-docker/ml-training@sha256:9dbf8694125d95f2af55534306fca0b5016f9691473052699fc33fed503ff857"
    entrypoint:
      - python
    command:
      - -m
      - scripts.training_server
    runtime: nvidia
    gpus: all
    ipc: host
    env:
      - GOOGLE_APPLICATION_CREDENTIALS: /key.json
      - POLLUX_LN_GCS_BUCKET: gs://pollux-enc-prod
      - KEY_MODE: real_keys
    secrets:
      - HF_TOKEN
      - TINFOIL_API_KEY
      - INTERNAL_SERVICE_SECRET

shim:
  listen-port: 443
  upstream-port: 8000
  publish-attestation: true
  tls-challenge: dns
  paths:
    - /ping
    - /status
    - /train
    - /upload/start
    - /upload/batch
    - /upload/finalize
    - /cancel_task
    - /queue_status
    - /list_task_ids
    - /lock_state
    - /clear_queue
    - /list_models
    - /v1/user/*
