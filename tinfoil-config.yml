shim-version: v0.3.12@sha256:b81f2295ae6750d61e94f810ce24077360001b6ec795d13643f3170df29e304d
cvm-version: 0.6.5
cpus: 128
memory: 1900544

containers:
  - name: ml-training
    image: "us-central1-docker.pkg.dev/workshop-labs-pbc/pollux-docker/ml-training@sha256:d5d9911b5c357f83818ef16639342b0483cf2f33d2cbe62bd8e5d047e485fa2d"
    entrypoint:
      - python
    command:
      - -m
      - scripts.training_server
    runtime: nvidia
    gpus: all
    ipc: host
    env:
      - GOOGLE_APPLICATION_CREDENTIALS: /key.json
      - POLLUX_LN_GCS_BUCKET: gs://pollux-enc-prod
      - KEY_MODE: real_keys
    secrets:
      - HF_TOKEN
      - TINFOIL_API_KEY
      - INTERNAL_SERVICE_SECRET

shim:
  listen-port: 443
  upstream-port: 8000
  publish-attestation: true
  tls-challenge: dns
  paths:
    - /ping
    - /status
    - /train
    - /upload/start
    - /upload/batch
    - /upload/finalize
    - /cancel_task
    - /queue_status
    - /list_task_ids
    - /lock_state
    - /clear_queue
    - /list_models
    - /v1/user/*
